<section id="sidebar" class="sidebar"> 
    <svg id="sidebar-fader"></svg>
    <div class="sidebar-header">
        {% if site.image %}
            <div class="sidebar-image-container">
                <img class="sidebar-image" src="{{ site.image }}" />
            </div>
        {% endif %}
        <div class="sidebar-text">
            <h1><a href="{{ "/posts/" }}" class="fade-onclick">{{ site.title }}</a></h1>
            <h6>{{ site.description }}</h6>
            {% if site.tagline %}
                <div class="sidebar-tagline">
                    {{ site.tagline }}
                </div>
            {% endif %}
        </div>
    </div>
    <div class="sidebar-links">
        {% if site.github_url %}
            <a href="{{ site.github_url }}"><img class="github-image" src="/assets/images/github-icon.png"/>github</a>
        {% endif %}
        {% if site.github_url and site.resume %}
                <br> 
        {% endif %}
            <a href="/posts/about"><img class="github-image" src="/assets/images/question-icon.png"/>about</a>
            <span style="color: rgb(255, 64, 64)"> | </span>
            <a href="/posts/about"><img class="github-image" src="/assets/images/tag-icon.png"/>tags</a>
            <span style="color: rgb(255, 64, 64)"> | </span>
        {% if site.resume %}
            <a href="{{ "/resume" }}" class="fade-onclick"><img class="github-image" src="/assets/images/resume-icon.png"/>resume</a>
        {% endif %}
    </div>
</section>
